<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caffeine Catch</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon.png">
<meta property="og:title" content="Caffeine Catch">
<meta property="og:description" content="Coffee-fueled AI enthusiast & developer">
<meta property="og:image" content="../assets/images/og-image.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
  }
  a.back-link {
    position: fixed;
    top: 20px;
    left: 24px;
    color: #00D4AA;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s, transform 0.2s;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  a.back-link:hover { color: #C4A882; transform: translateX(-3px); }
  a.back-link svg { width: 16px; height: 16px; }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: 1px;
    color: #C4A882;
  }
  .subtitle {
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 12px;
  }
  .scores {
    display: flex;
    gap: 24px;
    margin-bottom: 12px;
    font-size: 15px;
  }
  .scores span { color: #8b949e; }
  .scores strong { color: #00D4AA; font-weight: 600; }
  canvas {
    border: 2px solid #30363d;
    border-radius: 6px;
    background: #161b22;
    display: block;
    max-width: 100%;
    touch-action: none;
  }
  .controls {
    margin-top: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    background: #21262d;
    color: #e6edf3;
    border: 1px solid #30363d;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  button:hover { background: #30363d; border-color: #8b949e; }
  button.primary { background: #00D4AA22; border-color: #00D4AA55; color: #00D4AA; }
  button.primary:hover { background: #00D4AA33; }
  .instructions {
    margin-top: 14px;
    color: #8b949e;
    font-size: 13px;
    text-align: center;
    max-width: 420px;
    line-height: 1.5;
  }
  .legend {
    margin-top: 10px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 12px;
    color: #8b949e;
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend-chip { width: 16px; height: 16px; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,.25); }
  .legend-chip--bean { background: radial-gradient(circle at 35% 25%, #e3b277, #8b4e28 55%, #3c1f13); transform: rotate(-22deg); }
  .legend-chip--cup { border-radius: 5px 5px 8px 8px; background: linear-gradient(180deg, #f2e7d3, #c4a882); border: 1px solid #8b6f45; }
  .legend-chip--espresso { border-radius: 4px; background: linear-gradient(180deg, #f5c76b, #6f3a1d 58%, #2b160d); }
  .legend-chip--ice { border-radius: 4px; background: linear-gradient(135deg, #d8fbff, #6fd6f0); border: 1px solid rgba(255,255,255,.55); }
  .legend-chip--decaf { border-radius: 50%; background: radial-gradient(circle, #2b1a12 45%, #d65b4a 47%, #d65b4a 58%, transparent 60%); position: relative; }
  .legend-chip--decaf::after { content: ''; position: absolute; width: 18px; height: 3px; left: -1px; top: 6px; background: #d65b4a; transform: rotate(-35deg); border-radius: 2px; }
  .game-over {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    background: rgba(13,17,23,0.95);
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 28px 36px;
    display: none;
    z-index: 10;
  }
  .game-over h2 { font-size: 22px; margin-bottom: 8px; color: #e6edf3; }
  .game-over p { color: #8b949e; margin-bottom: 16px; font-size: 14px; }
  .canvas-wrap { position: relative; }
  @media (max-width: 480px) {
    h1 { font-size: 22px; }
    .scores { gap: 16px; font-size: 13px; }
    .instructions { font-size: 12px; }
  }
</style>
</head>
<body>
<h1><span class="legend-chip legend-chip--cup" style="width:28px;height:28px;vertical-align:middle;margin-right:8px;"></span> Caffeine Catch</h1>
<p class="subtitle">Catch the good stuff. Dodge the decaf.</p>

<div class="scores">
  <span>Score: <strong id="score">0</strong></span>
  <span>High: <strong id="high">0</strong></span>
  <span>Level: <strong id="level">1</strong></span>
</div>

<div class="canvas-wrap">
  <canvas id="game" width="400" height="520"></canvas>
  <div class="game-over" id="over">
    <h2>Spilled It!</h2>
    <p>Final Score: <strong id="final">0</strong></p>
    <button class="primary" onclick="startGame()">Play Again</button>
  </div>
</div>

<div class="controls">
  <button onclick="startGame()">New Game</button>
  <button onclick="togglePause()">Pause</button>
</div>

<p class="instructions">
  Move your mug with <strong>Arrow Keys</strong> or <strong>A / D</strong>.<br>
  On mobile, tap left or right side of the screen.
</p>

<div class="legend">
  <span><i class="legend-chip legend-chip--bean"></i> Bean +10</span>
  <span><i class="legend-chip legend-chip--cup"></i> Cup +25</span>
  <span><i class="legend-chip legend-chip--espresso"></i> Espresso +50</span>
  <span><i class="legend-chip legend-chip--ice"></i> Ice -20</span>
  <span><i class="legend-chip legend-chip--decaf"></i> Decaf -15</span>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highEl = document.getElementById('high');
const levelEl = document.getElementById('level');
const overEl = document.getElementById('over');
const finalEl = document.getElementById('final');

let W = 400, H = 520;
let score = 0, high = parseInt(localStorage.getItem('caffeine_high') || '0');
let level = 1, lives = 3, paused = false, running = false;
let mug = { x: W/2 - 30, y: H - 50, w: 60, h: 40, speed: 6 };
let items = [], particles = [], spawnTimer = 0, spawnInterval = 45;

highEl.textContent = high;

const ITEM_TYPES = [
  { kind: 'bean', label: 'Bean +10', score: 10, speed: 2.5, weight: 40, good: true },
  { kind: 'cup', label: 'Cup +25', score: 25, speed: 3.2, weight: 25, good: true },
  { kind: 'espresso', label: 'Espresso +50', score: 50, speed: 4.5, weight: 10, good: true },
  { kind: 'ice', label: 'Ice -20', score: -20, speed: 3.0, weight: 15, good: false },
  { kind: 'decaf', label: 'Decaf -15', score: -15, speed: 2.8, weight: 10, good: false },
];

function resize() {
  const maxW = Math.min(window.innerWidth - 40, 400);
  const scale = maxW / 400;
  canvas.style.width = maxW + 'px';
  canvas.style.height = (520 * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

let keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight','a','d','A','D'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key] = false);

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const x = (touch.clientX - rect.left) * (W / rect.width);
  if (x < W/2) keys['ArrowLeft'] = true;
  else keys['ArrowRight'] = true;
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  keys['ArrowLeft'] = false;
  keys['ArrowRight'] = false;
});

function pickItem() {
  const total = ITEM_TYPES.reduce((s, t) => s + t.weight, 0);
  let r = Math.random() * total;
  for (const t of ITEM_TYPES) {
    r -= t.weight;
    if (r <= 0) return { ...t, x: Math.random() * (W - 30) + 15, y: -30 };
  }
  return { ...ITEM_TYPES[0], x: Math.random() * (W - 30) + 15, y: -30 };
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 1,
      color
    });
  }
}

function update() {
  if (!running || paused) return;

  // Move mug
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) mug.x -= mug.speed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) mug.x += mug.speed;
  mug.x = Math.max(0, Math.min(W - mug.w, mug.x));

  // Spawn items
  spawnTimer++;
  const interval = Math.max(12, spawnInterval - level * 3);
  if (spawnTimer >= interval) {
    spawnTimer = 0;
    items.push(pickItem());
  }

  // Update items
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.y += it.speed + level * 0.3;

    // Collision with mug
    if (it.y + 20 > mug.y && it.y < mug.y + mug.h && it.x + 15 > mug.x && it.x - 15 < mug.x + mug.w) {
      score += it.score;
      if (score < 0) score = 0;
      const color = it.good ? '#00D4AA' : '#e74c3c';
      spawnParticles(it.x, it.y, color);
      items.splice(i, 1);

      if (!it.good) {
        lives--;
        if (lives <= 0) endGame();
      }
      continue;
    }

    // Missed good item = lose life
    if (it.y > H && it.good) {
      lives--;
      if (lives <= 0) endGame();
      items.splice(i, 1);
      continue;
    }

    // Missed bad item = no penalty, just remove
    if (it.y > H && !it.good) {
      items.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.04;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Level up every 150 points
  level = 1 + Math.floor(score / 150);
}

function drawBackground() {
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#101722');
  bg.addColorStop(0.55, '#151b22');
  bg.addColorStop(1, '#0d1117');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = 'rgba(196,168,130,0.06)';
  ctx.lineWidth = 1;
  for (let y = 44; y < H; y += 44) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  const glow = ctx.createRadialGradient(W/2, H - 70, 20, W/2, H - 70, 170);
  glow.addColorStop(0, 'rgba(196,168,130,0.16)');
  glow.addColorStop(1, 'rgba(196,168,130,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, H - 230, W, 230);
}

function drawMug(x, y, w, h, scale = 1) {
  ctx.save();
  ctx.shadowColor = 'rgba(196,168,130,0.35)';
  ctx.shadowBlur = 18;
  const body = ctx.createLinearGradient(x, y, x, y + h);
  body.addColorStop(0, '#f1dfbf');
  body.addColorStop(0.45, '#c4a882');
  body.addColorStop(1, '#8d6b45');
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.roundRect(x, y + h * 0.1, w, h * 0.85, 10 * scale); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 2; ctx.stroke();

  ctx.strokeStyle = '#c4a882'; ctx.lineWidth = 5 * scale;
  ctx.beginPath(); ctx.arc(x + w + 5 * scale, y + h * 0.48, 15 * scale, -Math.PI/2, Math.PI/2); ctx.stroke();
  ctx.strokeStyle = '#7b5a36'; ctx.lineWidth = 2 * scale;
  ctx.beginPath(); ctx.arc(x + w + 5 * scale, y + h * 0.48, 10 * scale, -Math.PI/2, Math.PI/2); ctx.stroke();

  const coffee = ctx.createLinearGradient(x, y, x, y + h * 0.45);
  coffee.addColorStop(0, '#6b3f22'); coffee.addColorStop(1, '#24110a');
  ctx.fillStyle = coffee;
  ctx.beginPath(); ctx.ellipse(x + w/2, y + h * 0.22, w * 0.42, h * 0.12, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,231,189,0.22)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(x + w/2, y + h * 0.22, w * 0.42, h * 0.12, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
}

function drawBean(x, y, r = 13, rot = -0.35) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
  ctx.shadowColor = 'rgba(196,168,130,0.35)'; ctx.shadowBlur = 10;
  const g = ctx.createRadialGradient(-r*.35, -r*.45, 2, 0, 0, r*1.25);
  g.addColorStop(0, '#f0c083'); g.addColorStop(.45, '#9b5a31'); g.addColorStop(1, '#34170d');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.ellipse(0, 0, r*.78, r*1.15, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,228,185,.22)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-2, -r*.85); ctx.bezierCurveTo(5, -r*.35, -6, r*.25, 2, r*.85); ctx.stroke();
  ctx.restore();
}

function drawCupItem(x, y, s = 1) { drawMug(x - 13*s, y - 13*s, 26*s, 25*s, .55*s); }

function drawEspresso(x, y, s = 1) {
  ctx.save(); ctx.translate(x, y);
  const g = ctx.createLinearGradient(0, -15*s, 0, 16*s);
  g.addColorStop(0, '#f2cf87'); g.addColorStop(.32, '#7b3f20'); g.addColorStop(1, '#1b0c07');
  ctx.fillStyle = g; ctx.shadowColor = 'rgba(245,199,107,.35)'; ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.roundRect(-10*s, -13*s, 20*s, 26*s, 4*s); ctx.fill();
  ctx.shadowBlur = 0; ctx.strokeStyle = 'rgba(255,255,255,.25)'; ctx.stroke();
  ctx.fillStyle = '#f5c76b'; ctx.beginPath(); ctx.ellipse(0, -8*s, 8*s, 3*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawIce(x, y, s = 1) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(.28);
  const g = ctx.createLinearGradient(-12*s, -12*s, 12*s, 12*s);
  g.addColorStop(0, '#f7feff'); g.addColorStop(.48, '#9eeafb'); g.addColorStop(1, '#2c91bd');
  ctx.fillStyle = g; ctx.shadowColor = 'rgba(111,214,240,.35)'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.roundRect(-12*s, -12*s, 24*s, 24*s, 4*s); ctx.fill();
  ctx.shadowBlur = 0; ctx.strokeStyle = 'rgba(255,255,255,.65)'; ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,.45)'; ctx.beginPath(); ctx.moveTo(-6*s, -5*s); ctx.lineTo(4*s, -9*s); ctx.stroke();
  ctx.restore();
}

function drawDecaf(x, y, s = 1) {
  drawBean(x, y, 12*s, .25);
  ctx.save(); ctx.translate(x, y); ctx.lineWidth = 4*s; ctx.strokeStyle = '#d65b4a';
  ctx.beginPath(); ctx.arc(0, 0, 17*s, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-12*s, 12*s); ctx.lineTo(12*s, -12*s); ctx.stroke();
  ctx.restore();
}

function drawItem(it) {
  const pulse = 1 + Math.sin(Date.now()/180 + it.y * .03) * .04;
  if (it.kind === 'bean') drawBean(it.x, it.y, 13 * pulse, -0.45);
  else if (it.kind === 'cup') drawCupItem(it.x, it.y, pulse);
  else if (it.kind === 'espresso') drawEspresso(it.x, it.y, pulse);
  else if (it.kind === 'ice') drawIce(it.x, it.y, pulse);
  else if (it.kind === 'decaf') drawDecaf(it.x, it.y, pulse);
}

function drawLifeCup(x, y) { drawMug(x, y, 16, 16, .32); }

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  // Draw polished player mug
  drawMug(mug.x, mug.y - 4, mug.w, mug.h + 8, 1);
  for (let i = 0; i < 3; i++) {
    const sx = mug.x + 16 + i * 15;
    const sy = mug.y - 14 + Math.sin(Date.now()/300 + i) * 4;
    ctx.strokeStyle = `rgba(230,237,243,${0.10 + i * 0.03})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sx, sy + 8);
    ctx.bezierCurveTo(sx - 6, sy + 1, sx + 7, sy - 2, sx + 1, sy - 9);
    ctx.stroke();
  }

  // Draw falling items as crisp vector art
  for (const it of items) drawItem(it);

  // Draw particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2 + p.life * 3, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Draw lives as mini cups
  ctx.font = '600 15px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#e6edf3';
  ctx.fillText('Lives', 12, 24);
  for (let i = 0; i < Math.max(0, lives); i++) drawLifeCup(62 + i * 24, 9);

  // Score and level
  scoreEl.textContent = score;
  levelEl.textContent = level;
}

function loop() {
  update();
  draw();
  if (running) requestAnimationFrame(loop);
}

function startGame() {
  score = 0;
  level = 1;
  lives = 3;
  items = [];
  particles = [];
  spawnTimer = 0;
  paused = false;
  running = true;
  overEl.style.display = 'none';
  loop();
}

function togglePause() {
  if (!running) return;
  paused = !paused;
}

function endGame() {
  running = false;
  if (score > high) {
    high = score;
    localStorage.setItem('caffeine_high', high);
    highEl.textContent = high;
  }
  finalEl.textContent = score;
  overEl.style.display = 'block';
}

startGame();
</script>
  <script src="../js/game-header.js?v=3"></script>
</body>
</html>
