<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Match | ☕ Shane Maynard</title>
  <meta name="description" content="Test your memory by matching pairs of cards. Flip two at a time and find all matching pairs to win!">
  <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
  <style>
    /* ── Reset & Design Tokens ──────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary:      #0d1117;
      --bg-secondary:     #161b22;
      --bg-card:          rgba(22, 27, 34, 0.65);
      --bg-card-hover:    rgba(30, 37, 48, 0.80);
      --coffee-light:     #C4A882;
      --coffee-mid:       #A68B5B;
      --coffee-dim:       rgba(196, 168, 130, 0.15);
      --ai-cyan:          #00D4AA;
      --ai-teal:          #4ECDC4;
      --ai-glow:          rgba(0, 212, 170, 0.35);
      --text-primary:     #e6edf3;
      --text-secondary:   #8b949e;
      --text-muted:       #6e7681;
      --border-subtle:    rgba(139, 148, 158, 0.15);
      --border-accent:    rgba(0, 212, 170, 0.30);
      --border-coffee:    rgba(196, 168, 130, 0.25);
      --font-sans:        'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --font-mono:        'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
      --radius-sm:        8px;
      --radius-md:        14px;
      --radius-lg:        20px;
      --shadow-glow-ai:   0 0 20px rgba(0, 212, 170, 0.25);
      --shadow-glow-coffee: 0 0 20px rgba(196, 168, 130, 0.25);
      --transition-base:  0.25s ease;
      --transition-slow:  0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.7;
      color: var(--text-primary);
      background-color: var(--bg-primary);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Subtle background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(196, 168, 130, 0.06), transparent),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0, 212, 170, 0.04), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Back Link ──────────────────────────────────────────── */
    .back-link {
      position: relative;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.25rem;
      margin-bottom: 0.5rem;
      padding: 0.5rem 1.2rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 500;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      background: rgba(22, 27, 34, 0.6);
      backdrop-filter: blur(8px);
      transition: all var(--transition-base);
    }
    .back-link:hover {
      color: var(--ai-cyan);
      border-color: var(--border-accent);
      background: rgba(0, 212, 170, 0.08);
      box-shadow: var(--shadow-glow-ai);
    }
    .back-link svg { width: 16px; height: 16px; }

    /* ── Page Header ─────────────────────────────────────────── */
    .game-header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1rem 1.5rem 0.5rem;
    }
    .game-header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--coffee-light) 30%, var(--ai-cyan) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .game-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-top: 0.2rem;
    }

    /* ── Controls Bar ────────────────────────────────────────── */
    .controls-bar {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      margin-bottom: 0.5rem;
    }

    .size-selector {
      display: flex;
      gap: 0.4rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 0.2rem;
    }
    .size-btn {
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all var(--transition-base);
      font-family: var(--font-mono);
    }
    .size-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .size-btn.active {
      color: var(--bg-primary);
      background: var(--ai-cyan);
      box-shadow: 0 0 10px rgba(0, 212, 170, 0.35);
    }

    .btn-reset {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1.1rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
      background: linear-gradient(135deg, rgba(196, 168, 130, 0.20), rgba(196, 168, 130, 0.08));
      border: 1px solid var(--border-coffee);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-base);
      font-family: var(--font-sans);
    }
    .btn-reset:hover {
      background: linear-gradient(135deg, rgba(196, 168, 130, 0.35), rgba(196, 168, 130, 0.15));
      border-color: var(--coffee-light);
      box-shadow: var(--shadow-glow-coffee);
    }

    /* ── Stats Bar ───────────────────────────────────────────── */
    .stats-bar {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 0.6rem 1.5rem;
      margin-bottom: 1rem;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.95rem;
      color: var(--text-secondary);
    }
    .stat-item .stat-label {
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
    }
    .stat-item .stat-value {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--ai-cyan);
      min-width: 2ch;
      text-align: right;
    }
    .stat-item .stat-value.moves { color: var(--coffee-light); }

    /* ── Game Board ──────────────────────────────────────────── */
    .board-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 1rem 2rem;
      width: 100%;
      max-width: 680px;
      flex: 1;
    }

    .board {
      display: grid;
      gap: 10px;
      width: 100%;
      perspective: 1200px;
    }
    .board.size-4 { grid-template-columns: repeat(4, 1fr); }
    .board.size-6 { grid-template-columns: repeat(6, 1fr); }

    /* ── Card ─────────────────────────────────────────────────── */
    .card {
      position: relative;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      perspective: 800px;
    }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
      transform-style: preserve-3d;
    }
    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Card back (face-down) */
    .card-back {
      background: linear-gradient(145deg, var(--bg-secondary), rgba(22, 27, 34, 0.9));
      border: 1px solid var(--border-subtle);
      transition: border-color var(--transition-base), box-shadow var(--transition-base);
    }
    .card-back::before {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: calc(var(--radius-md) - 4px);
      border: 2px solid rgba(196, 168, 130, 0.15);
      background:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 6px,
          rgba(196, 168, 130, 0.04) 6px,
          rgba(196, 168, 130, 0.04) 7px
        ),
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 6px,
          rgba(196, 168, 130, 0.04) 6px,
          rgba(196, 168, 130, 0.04) 7px
        );
      pointer-events: none;
    }
    .card-back::after {
      content: '☕';
      font-size: 1.4rem;
      opacity: 0.5;
      z-index: 1;
    }
    .card:not(.flipped):not(.matched):hover .card-back {
      border-color: var(--border-accent);
      box-shadow: 0 0 16px rgba(0, 212, 170, 0.20);
    }

    /* Card front (face-up) */
    .card-front {
      transform: rotateY(180deg);
      background: linear-gradient(145deg, rgba(22, 27, 34, 0.95), var(--bg-secondary));
      border: 1px solid var(--border-accent);
      flex-direction: column;
      gap: 0.2rem;
    }
    .card-front .card-emoji {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(0, 212, 170, 0.3));
    }
    .card-front .card-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Matched state */
    .card.matched .card-front {
      border-color: var(--coffee-mid);
      box-shadow: 0 0 20px rgba(196, 168, 130, 0.25);
    }
    .card.matched .card-front .card-emoji {
      filter: drop-shadow(0 0 10px rgba(196, 168, 130, 0.5));
    }

    /* Mismatch shake animation */
    @keyframes shake {
      0%, 100% { transform: rotateY(180deg) translateX(0); }
      20% { transform: rotateY(180deg) translateX(-6px); }
      40% { transform: rotateY(180deg) translateX(6px); }
      60% { transform: rotateY(180deg) translateX(-4px); }
      80% { transform: rotateY(180deg) translateX(4px); }
    }
    .card.mismatch .card-inner {
      animation: shake 0.45s ease;
    }

    /* Match pop animation */
    @keyframes matchPop {
      0% { transform: rotateY(180deg) scale(1); }
      40% { transform: rotateY(180deg) scale(1.08); }
      100% { transform: rotateY(180deg) scale(1); }
    }
    .card.match-anim .card-inner {
      animation: matchPop 0.4s ease;
    }

    /* Disabled interaction */
    .card.flipped, .card.matched, .board.locked .card {
      cursor: default;
    }

    /* ── Win Overlay ──────────────────────────────────────────── */
    .win-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(13, 17, 23, 0.88);
      backdrop-filter: blur(10px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    .win-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .win-modal {
      position: relative;
      background: linear-gradient(160deg, var(--bg-secondary), rgba(22, 27, 34, 0.95));
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2.5rem 2rem;
      text-align: center;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.5), var(--shadow-glow-ai);
      transform: scale(0.85) translateY(20px);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .win-overlay.visible .win-modal {
      transform: scale(1) translateY(0);
    }

    .win-emoji {
      font-size: 3.5rem;
      margin-bottom: 0.5rem;
      display: block;
    }
    .win-title {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--coffee-light), var(--ai-cyan));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.2rem;
    }
    .win-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .win-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }
    .win-stat-value {
      font-family: var(--font-mono);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ai-cyan);
    }
    .win-stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .win-actions {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      align-items: center;
    }
    .btn-play-again {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 2rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--bg-primary);
      background: linear-gradient(135deg, var(--ai-cyan), var(--ai-teal));
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-base);
      font-family: var(--font-sans);
      box-shadow: 0 0 16px rgba(0, 212, 170, 0.3);
    }
    .btn-play-again:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 24px rgba(0, 212, 170, 0.5);
    }
    .btn-change-size {
      font-size: 0.85rem;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 0.45rem 1.2rem;
      cursor: pointer;
      transition: all var(--transition-base);
      font-family: var(--font-sans);
      font-weight: 500;
    }
    .btn-change-size:hover {
      color: var(--text-primary);
      border-color: var(--border-coffee);
    }

    /* ── Confetti particles ───────────────────────────────────── */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 101;
      overflow: hidden;
    }
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      opacity: 0;
      animation: confettiFall 2.5s ease-in forwards;
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 520px) {
      .board { gap: 7px; }
      .card-back::after { font-size: 1rem; }
      .card-front .card-emoji { font-size: clamp(1.4rem, 6vw, 2rem); }
      .stats-bar { gap: 1rem; }
      .win-stats { grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; }
      .win-modal { padding: 1.8rem 1.5rem 1.5rem; }
    }

    /* ── Entrance animation ───────────────────────────────────── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeInUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
    }
  </style>
</head>
<body>

  <!-- Back Link -->
  <!-- Header -->
  <header class="game-header fade-in">
    <h1>🃏 Memory Match</h1>
    <p>Flip cards and find matching pairs</p>
  </header>

  <!-- Controls -->
  <div class="controls-bar fade-in" style="animation-delay:.05s">
    <div class="size-selector">
      <button class="size-btn active" data-size="4" title="4×4 grid (8 pairs)">4×4</button>
      <button class="size-btn" data-size="6" title="6×6 grid (18 pairs)">6×6</button>
    </div>
    <button class="btn-reset" id="btn-reset" title="Start a new game">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      New Game
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar fade-in" style="animation-delay:.1s">
    <div class="stat-item">
      <span class="stat-label">Moves</span>
      <span class="stat-value moves" id="stat-moves">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Matches</span>
      <span class="stat-value" id="stat-matches">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Time</span>
      <span class="stat-value" id="stat-time">0:00</span>
    </div>
  </div>

  <!-- Board -->
  <div class="board-wrapper fade-in" style="animation-delay:.15s">
    <div class="board size-4" id="board"></div>
  </div>

  <!-- Win Overlay -->
  <div class="win-overlay" id="win-overlay">
    <div class="win-modal">
      <span class="win-emoji">🎉</span>
      <h2 class="win-title">You Win!</h2>
      <div class="win-stats">
        <div class="win-stat">
          <span class="win-stat-value" id="win-moves">0</span>
          <span class="win-stat-label">Moves</span>
        </div>
        <div class="win-stat">
          <span class="win-stat-value" id="win-time">0:00</span>
          <span class="win-stat-label">Time</span>
        </div>
        <div class="win-stat">
          <span class="win-stat-value" id="win-score">0</span>
          <span class="win-stat-label">Score</span>
        </div>
      </div>
      <div class="win-actions">
        <button class="btn-play-again" id="btn-play-again">▶ Play Again</button>
        <button class="btn-change-size" id="btn-change-size">Change Grid Size</button>
      </div>
    </div>
  </div>

  <!-- Confetti container -->
  <div class="confetti-container" id="confetti-container"></div>

  <script>
    // ── Card emoji pool ──────────────────────────────────────────
    const ALL_EMOJIS = [
      { emoji: '☕', label: 'Coffee'   },
      { emoji: '🤖', label: 'Robot'    },
      { emoji: '🐍', label: 'Snake'    },
      { emoji: '🎨', label: 'Art'      },
      { emoji: '🚀', label: 'Rocket'   },
      { emoji: '⚡', label: 'Lightning'},
      { emoji: '🔥', label: 'Fire'     },
      { emoji: '🎲', label: 'Dice'     },
      { emoji: '🌟', label: 'Star'     },
      { emoji: '🎸', label: 'Guitar'  },
      { emoji: '🎯', label: 'Target'   },
      { emoji: '💡', label: 'Idea'     },
      { emoji: '🧩', label: 'Puzzle'   },
      { emoji: '🌙', label: 'Moon'     },
      { emoji: '🎵', label: 'Music'   },
      { emoji: '🐾', label: 'Paw'      },
      { emoji: '🏆', label: 'Trophy'  },
      { emoji: '🔮', label: 'Crystal'  },
    ];

    // ── Game State ──────────────────────────────────────────────
    let gridSize = 4;
    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let totalPairs = 0;
    let moves = 0;
    let timerInterval = null;
    let startTime = null;
    let elapsedSeconds = 0;
    let gameStarted = false;
    let boardLocked = false;

    // ── DOM refs ─────────────────────────────────────────────────
    const boardEl        = document.getElementById('board');
    const statMovesEl   = document.getElementById('stat-moves');
    const statMatchesEl = document.getElementById('stat-matches');
    const statTimeEl    = document.getElementById('stat-time');
    const winOverlay    = document.getElementById('win-overlay');
    const winMovesEl   = document.getElementById('win-moves');
    const winTimeEl     = document.getElementById('win-time');
    const winScoreEl    = document.getElementById('win-score');
    const confettiEl    = document.getElementById('confetti-container');

    // ── Shuffle (Fisher-Yates) ───────────────────────────────────
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // ── Format time ──────────────────────────────────────────────
    function formatTime(totalSec) {
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    // ── Start timer ──────────────────────────────────────────────
    function startTimer() {
      if (timerInterval) return;
      startTime = Date.now();
      elapsedSeconds = 0;
      timerInterval = setInterval(() => {
        elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
        statTimeEl.textContent = formatTime(elapsedSeconds);
      }, 250);
    }

    // ── Stop timer ───────────────────────────────────────────────
    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    // ── Create board ──────────────────────────────────────────────
    function initGame() {
      // Reset state
      stopTimer();
      cards = [];
      flippedCards = [];
      matchedPairs = 0;
      moves = 0;
      elapsedSeconds = 0;
      gameStarted = false;
      boardLocked = false;

      totalPairs = (gridSize * gridSize) / 2;

      // Update stats
      statMovesEl.textContent = '0';
      statMatchesEl.textContent = `${0}/${totalPairs}`;
      statTimeEl.textContent = '0:00';

      // Hide win overlay
      winOverlay.classList.remove('visible');
      confettiEl.innerHTML = '';

      // Pick emojis for this game
      const picked = shuffle([...ALL_EMOJIS]).slice(0, totalPairs);
      const cardData = shuffle([...picked, ...picked]);

      // Set board size class
      boardEl.className = `board size-${gridSize}`;
      boardEl.innerHTML = '';

      // Build cards
      cardData.forEach((data, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.emoji = data.emoji;
        card.dataset.index = idx;
        card.style.animationDelay = `${idx * 0.03}s`;

        card.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-back"></div>
            <div class="card-face card-front">
              <span class="card-emoji">${data.emoji}</span>
              <span class="card-label">${data.label}</span>
            </div>
          </div>
        `;

        card.addEventListener('click', () => handleCardClick(card));
        boardEl.appendChild(card);
        cards.push(card);
      });
    }

    // ── Card click handler ────────────────────────────────────────
    function handleCardClick(card) {
      // Ignore clicks on locked board, already flipped, or matched cards
      if (boardLocked) return;
      if (card.classList.contains('flipped')) return;
      if (card.classList.contains('matched')) return;

      // Start timer on first flip
      if (!gameStarted) {
        gameStarted = true;
        startTimer();
      }

      // Flip card
      card.classList.add('flipped');
      flippedCards.push(card);

      // If two cards are flipped, check for match
      if (flippedCards.length === 2) {
        moves++;
        statMovesEl.textContent = moves;
        boardLocked = true;

        const [card1, card2] = flippedCards;

        if (card1.dataset.emoji === card2.dataset.emoji) {
          // Match found!
          matchedPairs++;
          statMatchesEl.textContent = `${matchedPairs}/${totalPairs}`;

          // Add match animation
          setTimeout(() => {
            card1.classList.add('matched', 'match-anim');
            card2.classList.add('matched', 'match-anim');
            card1.classList.remove('flipped');
            card2.classList.remove('flipped');
          }, 300);

          flippedCards = [];
          boardLocked = false;

          // Check for win
          if (matchedPairs === totalPairs) {
            setTimeout(() => showWin(), 600);
          }
        } else {
          // Mismatch — shake then flip back
          setTimeout(() => {
            card1.classList.add('mismatch');
            card2.classList.add('mismatch');
          }, 400);

          setTimeout(() => {
            card1.classList.remove('flipped', 'mismatch');
            card2.classList.remove('flipped', 'mismatch');
            flippedCards = [];
            boardLocked = false;
          }, 900);
        }
      }
    }

    // ── Win screen ────────────────────────────────────────────────
    function showWin() {
      stopTimer();

      // Calculate score: base 10000, penalize moves & time
      const pairs = totalPairs;
      const minMoves = pairs; // perfect game
      const movePenalty = Math.max(0, moves - minMoves) * 50;
      const timePenalty = elapsedSeconds * 10;
      const score = Math.max(0, 10000 - movePenalty - timePenalty);

      winMovesEl.textContent = moves;
      winTimeEl.textContent = formatTime(elapsedSeconds);
      winScoreEl.textContent = score.toLocaleString();

      winOverlay.classList.add('visible');
      spawnConfetti();
    }

    // ── Confetti ──────────────────────────────────────────────────
    function spawnConfetti() {
      confettiEl.innerHTML = '';
      const colors = ['#00D4AA', '#C4A882', '#4ECDC4', '#A68B5B', '#e6edf3', '#ff6b6b', '#ffd93d'];
      for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.top = `${-10 - Math.random() * 20}px`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = `${6 + Math.random() * 8}px`;
        piece.style.height = `${6 + Math.random() * 8}px`;
        piece.style.animationDuration = `${2 + Math.random() * 1.5}s`;
        piece.style.animationDelay = `${Math.random() * 0.8}s`;
        confettiEl.appendChild(piece);
      }
    }

    // ── Event Listeners ───────────────────────────────────────────
    // Size selector
    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const size = parseInt(btn.dataset.size);
        if (size === gridSize) return;
        gridSize = size;
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        initGame();
      });
    });

    // Reset button
    document.getElementById('btn-reset').addEventListener('click', initGame);

    // Win overlay buttons
    document.getElementById('btn-play-again').addEventListener('click', initGame);
    document.getElementById('btn-change-size').addEventListener('click', () => {
      winOverlay.classList.remove('visible');
      confettiEl.innerHTML = '';
      // Click the other size button
      const nextSize = gridSize === 4 ? 6 : 4;
      gridSize = nextSize;
      document.querySelectorAll('.size-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.size) === nextSize);
      });
      initGame();
    });

    // Close overlay on background click
    winOverlay.addEventListener('click', (e) => {
      if (e.target === winOverlay) {
        winOverlay.classList.remove('visible');
        confettiEl.innerHTML = '';
      }
    });

    // ── Init ───────────────────────────────────────────────────────
    initGame();
  </script>
  <script src="../js/game-header.js"></script>
</body>
</html>
