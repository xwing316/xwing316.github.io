  <div class="games-page">

      <h1>🕹️ Game Lab</h1>
      <p>Browser-based arcade, puzzles, strategy &amp; classics — all handcrafted with vanilla JS</p>
    </div>

    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="puzzle">Puzzle</button>
      <button class="filter-btn" data-category="action">Action</button>
      <button class="filter-btn" data-category="strategy">Strategy</button>
      <button class="filter-btn" data-category="classic">Classic</button>
    </div>

    <div class="games-toolbar">
      <span class="games-count" id="games-count"></span>
      <select class="games-sort" id="games-sort" onchange="sortGames(this.value)">
        <option value="newest" selected>Newest First</option>
        <option value="name">Name A–Z</option>
        <option value="difficulty">Difficulty</option>
        <option value="category">Category</option>
      </select>
    </div>

    <div class="games-grid" id="games-container">
      <!-- Games rendered dynamically -->
    </div>
